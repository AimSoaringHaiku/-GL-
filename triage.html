<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タブネオス肝機能障害 薬局トリアージ イメトレシナリオ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #fcfcfc; }
        .choice-btn { transition: background 0.15s, border-color 0.15s; }
        .choice-btn.correct { border-color: #0F6E56; background: #E1F5EE; color: #085041; }
        .choice-btn.wrong   { border-color: #993C1D; background: #FAECE7; color: #4A1B0C; }
        .choice-btn.neutral { border-color: #185FA5; background: #E6F1FB; color: #042C53; }
        .feedback { display: none; }
        .feedback.show { display: block; }
        .next-btn { display: none; }
        .next-btn.show { display: block; }
        .score-panel { display: none; }
        .score-panel.show { display: block; }
    </style>
</head>
<body class="text-slate-800 antialiased p-6">

<div class="max-w-2xl mx-auto">

    <!-- ヘッダー -->
    <div class="border-b border-slate-100 pb-4 mb-6">
        <h1 class="text-lg font-bold text-slate-900">タブネオス肝機能障害</h1>
        <p class="text-xs text-slate-500 mt-1">薬局トリアージ イメトレシナリオ｜投与時系列 × 症状判断</p>
    </div>

    <!-- ゲーム本体 -->
    <div id="game">
        <div class="bg-white border border-slate-200 rounded-xl p-5">

            <!-- フックバッジ -->
            <div class="flex items-center gap-2 flex-wrap mb-3" id="hook-row"></div>

            <!-- シーンラベル -->
            <p class="text-[11px] text-slate-400 tracking-wider uppercase mb-1" id="scene-label"></p>

            <!-- 状況テキスト -->
            <p class="text-sm text-slate-800 leading-relaxed mb-3" id="scene-text"></p>

            <!-- 患者の声 -->
            <div class="bg-amber-50 border-l-4 border-amber-300 rounded-r-lg px-4 py-3 mb-4 text-sm text-amber-900 italic" id="patient-voice"></div>

            <!-- 選択肢 -->
            <div class="flex flex-col gap-2" id="choices"></div>

            <!-- フィードバック -->
            <div class="feedback rounded-lg px-4 py-3 mt-3 text-sm leading-relaxed" id="feedback"></div>

            <!-- ナビ -->
            <div class="flex justify-between items-center mt-4">
                <span class="text-xs text-slate-400" id="progress"></span>
                <button class="next-btn bg-white border border-slate-200 rounded-lg px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 cursor-pointer" id="next-btn">
                    次のシーン →
                </button>
            </div>
        </div>
    </div>

    <!-- スコアパネル -->
    <div class="score-panel bg-white border border-slate-200 rounded-xl p-8 text-center" id="score-panel">
        <div class="text-5xl font-light text-slate-900 mb-1" id="score-num"></div>
        <div class="text-xs text-slate-400 mb-4">シーン正解率</div>
        <p class="text-sm text-slate-600 leading-relaxed max-w-sm mx-auto" id="score-msg"></p>
        <a href="index.html" class="inline-block mt-6 text-xs text-slate-400 hover:text-slate-600 border border-slate-200 rounded-lg px-4 py-2">← ナレッジトップへ</a>
    </div>

</div>

<script>
const scenarios = [
  {
    hook: ["薬局の日常", "激動"],
    label: "シーン 1｜初回服薬指導",
    text: "タブネオスの処方箋が来た。初回調剤。患者は60代男性、ANCA関連血管炎で他院から転院してきた。手帳を確認すると既往に脂肪肝の記載あり。",
    voice: "「先生から『肝臓に気をつけて』とだけ言われたんだけど、具体的に何に注意すればいいの?」",
    choices: [
      { text: "倦怠感・黄疸・茶褐色尿などが出たらすぐ連絡してもらうよう指導し、投与開始から特に最初の3か月は肝機能検査を定期的に受けるよう伝える", type: "correct" },
      { text: "「副作用の資料があるのでお渡しします」と紙だけ渡す", type: "wrong" },
      { text: "「先生の指示通りに飲めば大丈夫ですよ」と安心させる", type: "wrong" },
    ],
    feedback: {
      correct: "◎ 正解。VBDSは投与開始後29〜56日に集中して発現。症状の具体的な説明と3か月モニタリングの約束が「ブレーキ」になる。既往の脂肪肝はリスク因子として処方医にも共有を。",
      wrong:   "△ 紙を渡すだけでは患者の行動変容につながらない。VBDS初期症状（黄疸・茶褐色尿）を言葉で伝え、いつ・どこに連絡すべきかまで確認する必要がある。",
    }
  },
  {
    hook: ["最悪のシナリオ", "ブレーキ（制御）"],
    label: "シーン 2｜来局時の訴え",
    text: "投与開始から40日目。患者が「体がだるくて食欲がない、2〜3日続いてる」と来局。外来は3週間後の予定。",
    voice: "「薬の副作用かなと思って。受診したほうがいいですか? でも予約がないと診てもらえないかもしれないし…」",
    choices: [
      { text: "「様子を見て、次の外来で先生に相談してください」と伝える", type: "wrong" },
      { text: "VBDS発現ピーク期間内であることを把握し、倦怠感・食欲不振は肝機能障害の初期症状の可能性があると判断。今日中に処方医またはかかりつけ医に連絡・受診するよう強く勧める", type: "correct" },
      { text: "市販の胃腸薬を勧め、改善しなければ受診を検討するよう伝える", type: "wrong" },
    ],
    feedback: {
      correct: "◎ 正解。投与開始40日目はVBDS発現ピーク（29〜56日）ど真ん中。倦怠感・食欲不振は薬物性肝障害の自他覚症状に明記されている。「3週間後まで待つ」は致命的になりうる。",
      wrong:   "✕ 致命的な判断ミス。倦怠感・食欲不振は薬物性肝障害の初期サインと完全に一致する。投与40日目という時系列を意識できていれば、緊急受診を勧める判断になるはず。",
    }
  },
  {
    hook: ["ブレーキ（制御）", "ローカルな文脈"],
    label: "シーン 3｜電話トリアージ",
    text: "タブネオス服薬中の別の患者（50代女性、投与55日目）から電話。「体が黄色っぽい気がする、尿が濃い茶色になった」との訴え。",
    voice: "「目の白いところも少し黄色くなってるかも。熱はないし痛くもないんだけど…」",
    choices: [
      { text: "「黄疸の可能性があります。今すぐ処方医か救急外来に連絡・受診してください。タブネオスは飲み続けて問題ないですか確認してから中止してください」と伝える", type: "neutral" },
      { text: "黄疸・茶褐色尿はVBDS/重篤肝機能障害の典型症状と即判断。「今日中に必ず受診、受診まで服薬を一時中断してください。受診時は薬の名前と症状が出た日を伝えてください」と具体的に指示、処方医へも薬局から連絡を入れる", type: "correct" },
      { text: "「念のため病院に連絡してみてはどうですか」と提案する", type: "wrong" },
    ],
    feedback: {
      correct: "◎ 最適解。黄疸＋茶褐色尿は緊急サイン。投与55日目はピーク期間内。服薬一時中断の指示と、薬局から処方医への情報連携が「命綱を編む」行動。受診時の情報（薬剤名・発症日）の伝達指示も重要。",
      neutral: "△ 受診勧告は正しいが、服薬継続の確認を医師に丸投げするのは遅い。黄疸＋茶褐色尿が揃った時点で即中断指示と薬局からの医師連絡が必要。",
      wrong:   "✕ 「連絡してみては」は弱すぎる。黄疸と茶褐色尿が同時に出ている時点で、薬物性肝障害の典型的な緊急症状。「今すぐ」という明確な指示が必要。",
    }
  },
  {
    hook: ["ローカルな文脈", "命綱"],
    label: "シーン 4｜フォローアップ設計",
    text: "新たにタブネオスが処方された患者（40代男性）。次回検査予定が不明。処方箋には検査指示の記載なし。",
    voice: "「薬もらいに来ただけで、検査とかは言われてないですよ。次はいつ来ればいいんですか?」",
    choices: [
      { text: "処方通り調剤して終了。検査は医師が指示するはず", type: "wrong" },
      { text: "「添付文書上、投与開始前と投与期間中に定期的な肝機能検査が必要です」と患者に説明し、次回受診時に検査オーダーを確認するよう伝える。同時に処方医にトレーシングレポートで検査計画の確認を送る", type: "correct" },
      { text: "「心配なら先生に電話してみてください」と患者に任せる", type: "wrong" },
    ],
    feedback: {
      correct: "◎ 正解。「検査結果はいつ聞くか」を患者に代わって能動的に設計するのが薬局の「ローカルな文脈」。添付文書の根拠を示しつつ、処方医への情報連携（トレーシングレポート）で境界を宣言するのがセーフティネット。",
      wrong:   "✕ 処方箋に書いてないから動かない、は静的なRMPと同じ失敗。薬局が能動的にフォローアップ設計に介入することが「命綱を編む」こと。",
    }
  },
];

let current = 0;
let score = 0;
let answered = false;

function hookBadge(text) {
  return `<span class="text-[11px] bg-slate-100 text-slate-600 border border-slate-200 px-2 py-0.5 rounded-full font-medium">${text}</span>`;
}

function render() {
  if (current >= scenarios.length) {
    document.getElementById('game').style.display = 'none';
    const panel = document.getElementById('score-panel');
    panel.classList.add('show');
    const pct = Math.round(score / scenarios.length * 100);
    document.getElementById('score-num').textContent = score + ' / ' + scenarios.length;
    document.getElementById('score-msg').textContent =
      pct === 100 ? '全問正解。現場のブレーキ役として完璧な判断です。' :
      pct >= 75  ? '優秀です。惜しかった選択肢を振り返って、さらに精度を上げましょう。' :
                   '判断の根拠（時系列・症状パターン）をもう一度整理しましょう。実際の患者さんを守るための視点がカギです。';
    return;
  }

  const s = scenarios[current];
  answered = false;

  document.getElementById('hook-row').innerHTML =
    s.hook.map((h, i) => hookBadge(h) + (i < s.hook.length - 1 ? '<span class="text-slate-300 text-xs">→</span>' : '')).join('');
  document.getElementById('scene-label').textContent = s.label;
  document.getElementById('scene-text').textContent = s.text;
  document.getElementById('patient-voice').textContent = s.voice;
  document.getElementById('progress').textContent = (current + 1) + ' / ' + scenarios.length;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback rounded-lg px-4 py-3 mt-3 text-sm leading-relaxed';
  fb.textContent = '';

  document.getElementById('next-btn').className = 'next-btn bg-white border border-slate-200 rounded-lg px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 cursor-pointer';

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  s.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn w-full border border-slate-200 bg-white rounded-lg px-4 py-3 text-left text-sm text-slate-700 hover:bg-slate-50 cursor-pointer leading-relaxed';
    btn.textContent = c.text;
    btn.onclick = () => select(i);
    choicesEl.appendChild(btn);
  });
}

function select(i) {
  if (answered) return;
  answered = true;
  const s = scenarios[current];
  const chosen = s.choices[i];
  const btns = document.querySelectorAll('.choice-btn');
  btns[i].classList.add(chosen.type);

  if (chosen.type === 'correct') score++;

  const fb = document.getElementById('feedback');
  const fbText = s.feedback[chosen.type] || (chosen.type === 'correct' ? s.feedback.correct : s.feedback.wrong);
  fb.textContent = fbText;
  fb.className = 'feedback show rounded-lg px-4 py-3 mt-3 text-sm leading-relaxed ' +
    (chosen.type === 'correct' ? 'bg-emerald-50 text-emerald-900 border border-emerald-200' :
     chosen.type === 'neutral'  ? 'bg-blue-50 text-blue-900 border border-blue-200' :
                                  'bg-rose-50 text-rose-900 border border-rose-200');

  document.getElementById('next-btn').className = 'next-btn show bg-white border border-slate-200 rounded-lg px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 cursor-pointer';
}

document.getElementById('next-btn').onclick = () => { current++; render(); };

render();
</script>
</body>
</html>
