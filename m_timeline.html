<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医療デバイス学 × GL 縦型統合タイムライン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #fcfcfc; }
    </style>
</head>
<body class="text-slate-800 antialiased p-6">

<div class="max-w-7xl mx-auto bg-white border border-slate-200 rounded-xl shadow-sm p-6">

    <!-- ヘッダー -->
    <div class="border-b border-slate-100 pb-4 mb-8">
        <h1 class="text-xl font-bold text-slate-900">医療デバイス学 × GL 縦型統合タイムライン</h1>
        <p class="text-xs text-slate-500 mt-1">データベースの並びに準拠。縦の時間軸で、無限に情報空間を拡張可能</p>
    </div>

    <!-- カラムヘッダー -->
    <div class="grid grid-cols-12 gap-4 bg-slate-50 border border-slate-200 rounded-t-lg p-3 text-xs font-bold text-slate-500 tracking-wider text-center sticky top-0 z-20">
        <div class="col-span-1">時系列</div>
        <div class="col-span-2 border-l border-slate-200">① 薬品・クラス</div>
        <div class="col-span-2 border-l border-slate-200">② 治療主体 / GL</div>
        <div class="col-span-2 border-l border-slate-200">③ IoT / デバイス</div>
        <div class="col-span-5 border-l border-slate-200">📊 右側の無限情報空間（エビデンス・リスク・スピーチ）</div>
    </div>

    <!-- 縦型タイムライン本体 -->
    <div id="timeline" class="border-x border-b border-slate-200 rounded-b-lg divide-y divide-slate-100 bg-white"></div>
</div>

<script>
const database = [
  {
    id: "item_001",
    date: "2026-03",
    drug_class: "インスリン製剤",
    drug_name: "次世代超速効型インスリン",
    treatment_main: "患者主導（自己注射）",
    gl_flow_node: "ステップ3：インスリン導入期",
    evidence_meta: {
      gl_reliability_class: "学会：甲（推奨度A）",
      evidence_level: "Level 1a"
    },
    benefit: {
      efficacy_claim: "低血糖リスク低減",
      evidence_integrity: "クリーン"
    },
    market_epidemiology: {
      target_disease: "2型糖尿病",
      market_share_status: "既存A社が70%独占。30%のリプレイスを想定。"
    },
    risk: {
      major_adverse: "軽度低血糖スパイク",
      incidence: "頻度低",
      onset_window: { start: 1, end: 14 }
    },
    balance: {
      verdict: "ベネフィットが圧倒的に上回る",
      who_decided: "臨床試験データが立証"
    },
    device_iot: {
      category: "インスリン針・デバイス",
      name: "スマートキャップ接続型極細針（34G）",
      description: "穿刺痛を抑え、注入単位数を自動ログ記録するデバイス学の結晶。"
    },
    snippets: {
      speech_bone: "「先生、ここのフローですが、針のアップデートとIoTが融合したことで、患者さんの記入漏れのトラップ自体が消滅します。」",
      transition_hint: "次の検査機器の改善フェーズへ、シームレスにデータがトランスポーズされます。"
    }
  },
  {
    id: "item_002",
    date: "2026-05",
    drug_class: "補体C5a受容体拮抗薬",
    drug_name: "タブネオス",
    treatment_main: "医師主導・厳格管理",
    gl_flow_node: "ANCA関連血管炎 治療フロー",
    evidence_meta: {
      gl_reliability_class: "学会信頼性：不全",
      evidence_level: "Level 1b"
    },
    benefit: {
      efficacy_claim: "ステロイドを減らせる",
      evidence_integrity: "改竄あり"
    },
    market_epidemiology: {
      target_disease: "ANCA関連血管炎",
      market_share_status: "承認取消相当のインパクト事象発生によりシェア急落予測。"
    },
    risk: {
      major_adverse: "VBDS・重篤肝機能障害",
      incidence: "380人に1人",
      onset_window: { start: 29, end: 56 },
      rmp_status: "機能不全"
    },
    balance: {
      verdict: "リスクがベネフィットを上回る（承認取消相当）",
      who_decided: "現場の医師の自発報告が暴いた"
    },
    device_iot: {
      category: "安全性監視連携",
      name: "自律型RMPアラートシステム",
      description: "29〜56日の発症ウィンドウにいる患者を自動スクリーニングする仕組み。"
    },
    snippets: {
      speech_bone: "「タブネオスのエビデンス改竄とVBDSリスクは現場の自発報告で暴露されました。発症ウィンドウの可視化システムを届けることが今最優先されるべき施策です。」",
      transition_hint: "PMDAのRMP更新と同時にこの情報空間が自動アップデートされます。"
    }
  }
];

function riskBar(item) {
  if (!item.risk.onset_window) return '';
  const s = item.risk.onset_window.start;
  const e = item.risk.onset_window.end;
  // 0〜84日を100%として左位置と幅を計算
  const left = Math.round(s / 84 * 100);
  const width = Math.round((e - s) / 84 * 100);
  return `
    <div class="bg-amber-50/50 border border-amber-200 rounded p-2.5">
      <p class="text-amber-800 font-bold text-[9px] tracking-wider uppercase mb-1">🚨 リブレ型 リスクタイムライン（発症ウィンドウ）</p>
      <div class="flex items-center gap-2">
        <div class="text-slate-900 font-bold text-[11px] shrink-0">投与 ${s}〜${e} 日目</div>
        <div class="w-full bg-slate-200 h-2 rounded relative overflow-hidden">
          <div class="absolute bg-rose-500 h-full rounded" style="left:${left}%;width:${width}%"></div>
        </div>
        <div class="text-[10px] font-bold text-rose-600 shrink-0">⚠️ ${item.risk.major_adverse}（${item.risk.incidence}）</div>
      </div>
      <p class="text-[10px] text-slate-500 mt-1">判定：<span class="text-rose-700 font-semibold">${item.balance.verdict}</span>（${item.balance.who_decided}）</p>
    </div>`;
}

function integrityBadge(val) {
  if (val === '改竄あり') {
    return `<span class="mt-1.5 text-[10px] bg-rose-50 text-rose-600 border border-rose-200 px-1.5 py-0.5 rounded w-max font-bold">⚠️ ${val}</span>`;
  }
  return `<span class="mt-1.5 text-[10px] bg-emerald-50 text-emerald-600 border border-emerald-200 px-1.5 py-0.5 rounded w-max font-bold">✓ クリーン</span>`;
}

function renderRow(item) {
  return `
    <div class="grid grid-cols-12 gap-4 p-4 hover:bg-slate-50/50 transition">

      <div class="col-span-1 flex flex-col justify-center items-center font-mono text-xs font-bold text-slate-400">
        ${item.date}
        <div class="w-px flex-1 bg-slate-200 mt-2"></div>
      </div>

      <div class="col-span-2 flex flex-col justify-center border-l border-slate-100 pl-2">
        <span class="text-[10px] bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded w-max mb-1 font-medium">${item.drug_class}</span>
        <strong class="text-slate-900 text-sm block">${item.drug_name}</strong>
        ${integrityBadge(item.benefit.evidence_integrity)}
      </div>

      <div class="col-span-2 flex flex-col justify-center border-l border-slate-100 pl-2">
        <span class="text-[10px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded w-max mb-1 font-medium">${item.treatment_main}</span>
        <p class="text-slate-700 text-xs leading-tight font-semibold">${item.gl_flow_node}</p>
      </div>

      <div class="col-span-2 flex flex-col justify-center border-l border-slate-100 pl-2">
        <span class="text-[10px] bg-purple-50 text-purple-600 px-1.5 py-0.5 rounded w-max mb-1 font-medium">${item.device_iot.category}</span>
        <p class="text-slate-700 text-xs font-semibold leading-tight">📱 ${item.device_iot.name}</p>
        <p class="text-[10px] text-slate-400 mt-1 leading-snug">${item.device_iot.description}</p>
      </div>

      <div class="col-span-5 border-l border-slate-100 pl-4 grid grid-cols-1 gap-3 text-xs py-1">

        <div class="flex justify-between items-start bg-slate-50 p-2.5 rounded border border-slate-100 gap-2">
          <div class="space-y-0.5 text-[11px] w-1/2">
            <p class="text-slate-400 font-bold text-[9px] tracking-wider uppercase">🛡️ エビデンス</p>
            <p class="text-slate-900 font-medium">GL階級: ${item.evidence_meta.gl_reliability_class}</p>
            <p class="text-slate-600">レベル: ${item.evidence_meta.evidence_level}（${item.benefit.efficacy_claim}）</p>
          </div>
          <div class="space-y-0.5 text-[11px] w-1/2 border-l border-slate-200 pl-2">
            <p class="text-slate-400 font-bold text-[9px] tracking-wider uppercase">📊 疾患疫学・シェア</p>
            <p class="text-slate-900 font-medium">${item.market_epidemiology.target_disease}</p>
            <p class="text-slate-600 text-[10px] leading-tight">${item.market_epidemiology.market_share_status}</p>
          </div>
        </div>

        ${riskBar(item)}

        <div class="bg-emerald-50/40 border border-emerald-100 rounded p-2.5">
          <p class="text-emerald-800 font-bold text-[9px] tracking-wider uppercase mb-1">🗣️ スピーチ用口語スニペット</p>
          <p class="text-emerald-950 font-medium leading-relaxed bg-white p-2 border border-emerald-100 rounded text-[11px]">
            ${item.snippets.speech_bone}
          </p>
          <p class="text-[10px] text-slate-400 mt-1">💡 <span class="font-semibold text-slate-600">展開可能性:</span> ${item.snippets.transition_hint}</p>
        </div>

      </div>
    </div>`;
}

document.getElementById('timeline').innerHTML = database.map(renderRow).join('');
</script>
</body>
</html>
