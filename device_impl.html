<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医療デバイス学 × GL タイムライン・ナレッジシステム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #fcfcfc; }
        .timeline-grid { display: grid; grid-template-columns: 120px 1fr; }
        .node-card { transition: border-color 0.15s, background-color 0.15s; }
        .node-card.selected { border-color: #10b981; background-color: rgba(16,185,129,0.06); }
        .synapse-svg { position:absolute; inset:0; pointer-events:none; width:100%; height:100%; z-index:10; }
    </style>
</head>
<body class="text-slate-800 antialiased p-6">

<div class="max-w-6xl mx-auto bg-white border border-slate-200 rounded-xl shadow-sm p-6 relative">

    <!-- ヘッダー -->
    <div class="flex justify-between items-center border-b border-slate-100 pb-4 mb-6">
        <div>
            <h1 class="text-xl font-bold text-slate-900">医療デバイス学 × GL 統合タイムライン</h1>
            <p class="text-xs text-slate-500 mt-1">マクロな市場・エビデンスから、ミクロなスピーチ骨子までを一気通貫</p>
        </div>
        <label class="inline-flex items-center cursor-pointer bg-slate-50 border border-slate-200 px-3 py-1.5 rounded-lg text-xs font-medium">
            <input type="checkbox" id="synapseToggle" checked onchange="toggleSynapse(this.checked)" class="sr-only peer">
            <div class="relative w-7 h-4 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-emerald-500"></div>
            <span class="ms-2 text-slate-700">連携シナプスを表示</span>
        </label>
    </div>

    <!-- タイムライングリッド -->
    <div class="relative border border-slate-200 rounded-lg overflow-hidden bg-slate-50/30 mb-6">

        <!-- ヘッダー行 -->
        <div class="timeline-grid border-b border-slate-100 bg-slate-50 text-[10px] font-bold tracking-wider text-slate-400 uppercase">
            <div class="p-3 border-r border-slate-200">レイヤー</div>
            <div class="grid grid-cols-3 divide-x divide-slate-100">
                <div class="p-3 text-center">2026年Q1</div>
                <div class="p-3 text-center">2026年Q2</div>
                <div class="p-3 text-center">2026年Q3以降</div>
            </div>
        </div>

        <div class="relative" id="timelineBody">

            <!-- 1層：薬品・クラス -->
            <div class="timeline-grid border-b border-slate-100 min-h-[70px]">
                <div class="p-3 border-r border-slate-200 bg-slate-50/50 flex items-center text-xs font-semibold text-slate-500">① 薬品・クラス</div>
                <div class="grid grid-cols-3 p-2 gap-2">
                    <div id="node-item_001"
                         onclick="selectItem(0)"
                         class="node-card selected border border-slate-200 bg-white p-2 rounded shadow-sm cursor-pointer hover:border-slate-400 text-xs">
                        <span class="text-[10px] bg-slate-100 text-slate-600 px-1 rounded block w-max mb-1" id="class_001"></span>
                        <strong class="text-slate-900 block" id="name_001"></strong>
                    </div>
                    <div></div>
                    <div></div>
                </div>
            </div>

            <!-- 2層：治療主体 / GL -->
            <div class="timeline-grid border-b border-slate-100 min-h-[70px]">
                <div class="p-3 border-r border-slate-200 bg-slate-50/50 flex items-center text-xs font-semibold text-slate-500">② 治療主体 / GL</div>
                <div class="grid grid-cols-3 p-2 gap-2">
                    <div class="flex items-center justify-center text-slate-400 text-[10px] border border-dashed border-slate-200 rounded bg-white/50" id="arrow_001"></div>
                    <div id="node-item_002"
                         onclick="selectItem(1)"
                         class="node-card border border-slate-200 bg-white p-2 rounded shadow-sm cursor-pointer hover:border-slate-400 text-xs">
                        <span class="text-[10px] bg-blue-50 text-blue-600 px-1 rounded block w-max mb-1" id="treatment_002"></span>
                        <strong class="text-slate-900 block" id="gl_002"></strong>
                    </div>
                    <div></div>
                </div>
            </div>

            <!-- 3層：IoT / デバイス -->
            <div class="timeline-grid min-h-[70px]">
                <div class="p-3 border-r border-slate-200 bg-slate-50/50 flex items-center text-xs font-semibold text-slate-500">③ IoT / デバイス</div>
                <div class="grid grid-cols-3 p-2 gap-2">
                    <div class="border border-slate-100 bg-slate-50/50 p-2 rounded text-[11px] text-slate-500" id="device_001"></div>
                    <div class="border border-slate-100 bg-slate-50/50 p-2 rounded text-[11px] text-slate-500" id="device_002"></div>
                    <div></div>
                </div>
            </div>

            <!-- シナプスSVG -->
            <svg id="synapseSvg" class="synapse-svg">
                <path d="M 280 45 C 380 45, 380 115, 480 115" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 3"/>
                <circle cx="480" cy="115" r="3" fill="#10b981"/>
                <text x="320" y="68" fill="#047857" font-size="9" font-weight="bold">データ連携・同期</text>
            </svg>
        </div>
    </div>

    <!-- ダッシュボード -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-slate-50/50 border border-slate-200 rounded-lg p-4">

        <!-- 左：エビデンス・疫学 -->
        <div class="bg-white border border-slate-200 rounded-lg p-4 space-y-4">
            <div>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">🛡️ エビデンス・GL信頼度</h3>
                <div class="space-y-1 text-xs">
                    <p><span class="text-slate-500">学会信頼性:</span> <span class="font-medium text-slate-900" id="d_gl_reliability"></span></p>
                    <p><span class="text-slate-500">エビデンス:</span> <span class="font-medium text-slate-900" id="d_evidence_level"></span></p>
                    <p><span class="text-slate-500">確実度:</span> <span class="font-medium text-slate-900" id="d_certainty"></span></p>
                </div>
            </div>
            <div class="border-t border-slate-100 pt-3">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">📊 疾患疫学・シェア状況</h3>
                <div class="space-y-1 text-xs">
                    <p class="font-semibold text-slate-900" id="d_disease"></p>
                    <p class="text-slate-600 text-[11px] leading-relaxed" id="d_epidemiology"></p>
                    <p class="text-slate-600 text-[11px] leading-relaxed bg-slate-50 p-1.5 rounded mt-1 border border-slate-100" id="d_market"></p>
                </div>
            </div>
        </div>

        <!-- 中央：スピーチスニペット -->
        <div class="bg-white border border-slate-200 rounded-lg p-4 flex flex-col justify-between">
            <div>
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">🗣️ スピーチ用口語スニペット</h3>
                <p class="text-[11px] text-slate-500 mb-2 italic">※準備負荷を下げ、そのまま実況中継するための骨子</p>
                <div class="bg-emerald-50/50 border border-emerald-100 rounded-lg p-3 text-xs text-emerald-950 font-medium leading-relaxed" id="d_speech"></div>
            </div>
            <div class="text-[11px] text-slate-500 border-t border-slate-100 pt-2 mt-2">
                <span class="font-bold text-slate-700">展開可能性:</span> <span id="d_transition"></span>
            </div>
        </div>

        <!-- 右：治療フロー -->
        <div class="bg-white border border-slate-200 rounded-lg p-4">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">🔄 治療フロー・選択肢一覧</h3>
            <p class="text-[11px] font-bold text-slate-700 mb-2 bg-slate-100 px-2 py-1 rounded" id="d_flow_title"></p>
            <div class="space-y-2 max-h-[160px] overflow-y-auto pr-1" id="d_alternatives"></div>
        </div>
    </div>
</div>

<script>
const data = [
  {
    id: "item_001",
    date: "2026-03",
    drug_class: "インスリン製剤",
    drug_name: "次世代超速効型インスリン",
    treatment_main: "患者主導（自己注射）",
    gl_flow_node: "ステップ3：インスリン導入期",
    evidence_meta: {
      gl_reliability_class: "日本糖尿病学会：甲（推奨度A）",
      evidence_level: "Level 1a（メタアナリシス）",
      certainty_degree: "高（確実な臨床効果）"
    },
    market_epidemiology: {
      target_disease: "2型糖尿病（インスリン要治療期）",
      epidemiology_total: "国内推定患者数：約1,000万人（うち該当約80万人）",
      market_share_status: "既存A社が70%独占。本新薬＋デバイスで30%のリプレイスを想定。"
    },
    device_iot: {
      name: "スマートキャップ接続型極細針（34G）"
    },
    treatment_flow_toggle: {
      current_flow_title: "【GL準拠】インスリン強化療法フロー",
      alternatives: [
        { name: "選択肢A：従来型1日1回注射", pros_cons: "簡便だが血糖日内変動のコントロール不良リスクあり。" },
        { name: "選択肢B：スマートデバイス併用（推奨）", pros_cons: "初動コストはあるが、低血糖リスクを35%低減（エビデンスに基づく）。" }
      ]
    },
    snippets: {
      speech_bone: "「経営層の皆様、学会信頼性『甲』のエビデンスを武器に、A社が独占する80万人の市場シェアへ、このデバイス学の結晶で切り込みます。」",
      transition_hint: "次の検査機器改善フェーズとシナプス接続することで、プラットフォームの優位性が確定します。"
    }
  },
  {
    id: "item_002",
    date: "2026-05",
    drug_class: "診断・検査",
    drug_name: "次世代パッチ型CGM",
    treatment_main: "遠隔診療・自己管理連携",
    gl_flow_node: "スクリーニング・評価期",
    evidence_meta: {
      gl_reliability_class: "関連学会合同ガイドライン：推奨度B",
      evidence_level: "Level 1b（個別RCT）",
      certainty_degree: "中〜高（標準的な導入推奨）"
    },
    market_epidemiology: {
      target_disease: "持続血糖測定（CGM）市場全体",
      epidemiology_total: "遠隔医療モニタリング対象患者：国内約50万人",
      market_share_status: "新技術パッチ導入により、年間成長率15%の見込み市場。"
    },
    device_iot: {
      name: "低侵襲連続自動血糖測定パッチ"
    },
    treatment_flow_toggle: {
      current_flow_title: "【GL準拠】持続血糖モニタリング導入基準",
      alternatives: [
        { name: "選択肢A：SMBG（自己血糖測定）継続", pros_cons: "コストは低いが点での測定となり、夜間低血糖を見落とすトラップあり。" },
        { name: "選択肢B：連続パッチCGM導入", pros_cons: "常時データ連携可能。インスリン投与量自動最適化の土台となる。" }
      ]
    },
    snippets: {
      speech_bone: "「先生、データが途切れないパッチ型CGMへの移行こそが、患者さんの記入ストレスをなくし、正確なGLフロー評価を可能にする唯一の道です。」",
      transition_hint: "吸入器具デバイスのスマート化トレンドとも、将来的にデータ層でジョイント可能です。"
    }
  }
];

let selectedIndex = 0;

function setText(id, text) {
  const el = document.getElementById(id);
  if (el) el.textContent = text;
}

function initStatic() {
  setText('class_001', data[0].drug_class);
  setText('name_001', data[0].drug_name);
  setText('arrow_001', '── ' + data[0].treatment_main + ' ──>');
  setText('treatment_002', data[1].treatment_main);
  setText('gl_002', data[1].gl_flow_node);
  setText('device_001', '📱 ' + data[0].device_iot.name);
  setText('device_002', '🔬 ' + data[1].device_iot.name);
}

function renderDashboard(index) {
  const item = data[index];
  setText('d_gl_reliability', item.evidence_meta.gl_reliability_class);
  setText('d_evidence_level', item.evidence_meta.evidence_level);
  setText('d_certainty', item.evidence_meta.certainty_degree);
  setText('d_disease', item.market_epidemiology.target_disease);
  setText('d_epidemiology', item.market_epidemiology.epidemiology_total);
  setText('d_market', item.market_epidemiology.market_share_status);
  setText('d_speech', item.snippets.speech_bone);
  setText('d_transition', item.snippets.transition_hint);
  setText('d_flow_title', item.treatment_flow_toggle.current_flow_title);

  const altContainer = document.getElementById('d_alternatives');
  altContainer.innerHTML = '';
  item.treatment_flow_toggle.alternatives.forEach(alt => {
    altContainer.innerHTML += `
      <div class="border border-slate-100 rounded text-xs">
        <div class="bg-slate-50/80 p-2 font-medium text-slate-800">${alt.name}</div>
        <div class="p-2 text-[11px] text-slate-600 bg-white border-t border-slate-50 leading-relaxed">${alt.pros_cons}</div>
      </div>`;
  });
}

function selectItem(index) {
  selectedIndex = index;
  document.querySelectorAll('.node-card').forEach(el => el.classList.remove('selected'));
  document.getElementById('node-item_00' + (index + 1)).classList.add('selected');
  renderDashboard(index);
}

function toggleSynapse(show) {
  document.getElementById('synapseSvg').style.display = show ? '' : 'none';
}

// 初期化
initStatic();
renderDashboard(0);
</script>
</body>
</html>
