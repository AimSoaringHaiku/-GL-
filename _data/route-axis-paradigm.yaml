投与経路軸_医療パラダイムシフト_タイムライン:

  概要:
    軸: "投与経路・デバイス進化を主軸に、作用機序パラダイムを従属フィールドとして配置"
    用途: "薬局スタッフ向け文脈共有・スピーチ背景知識・患者説明の補助"
    参照元YAMLとの関係: "ﾊﾟﾗﾀﾞｲﾑ_yaml.txtを投与経路軸で再編成・補完"

  # ─────────────────────────────────────
  # 経口（内服）
  # ─────────────────────────────────────
  経口_内服:

    - 時代: "1950年代〜"
      投与経路: "経口（低分子）"
      代表薬剤: "降圧薬・抗生物質・NSAIDs 等"
      シフトの核心: "錠剤・カプセルによるマス・メディケーション。胃腸管吸収＋肝初回通過効果が前提の設計"
      薬局文脈: "服薬指導の原型。アドヒアランス管理が主業務"

    - 時代: "2012年〜"
      投与経路: "経口（低分子・細胞内標的）"
      代表薬剤: "JAK阻害薬（トファシチニブ＝ゼルヤンツ、バリシチニブ＝オルミエント）"
      シフトの核心: "内服のまま細胞内シグナル（JAK-STAT経路）をピンポイント遮断。注射剤だった生物学的製剤を経口で代替する設計"
      薬局文脈: "帯状疱疹・感染リスクの説明義務。タブネオス的な「静的RMPでは追いつかない副作用モニタリング」の先行例"

    - 時代: "2019年〜"
      投与経路: "経口（ペプチド製剤の内服化）"
      代表薬剤: "GLP-1受容体作動薬（セマグルチド＝リベルサス、オゼンピック）"
      シフトの核心: "胃酸分解・初回通過効果の二重バリアを吸収促進剤（SNAC）で突破。注射剤依存だったペプチドの内服化"
      薬局文脈: "急速な適応拡大（肥満→心血管→腎保護）。情報更新速度がRMP設計を上回るリスクあり"

    - 時代: "2025年〜"
      投与経路: "経口（低分子・注射代替）"
      代表薬剤: "ゲパント系（ナルティーク＝アトゲパント、リメゲパント）"
      シフトの核心: "抗体製剤（注射）頼みだったCGRP経路遮断を低分子内服で実現。血管収縮副作用もなし"
      薬局文脈: "片頭痛の予防・急性期両対応。トリプタン禁忌患者への選択肢として説明設計が必要"

  # ─────────────────────────────────────
  # 吸入（肺・気道）
  # ─────────────────────────────────────
  吸入_肺_気道:

    - 時代: "1970年代〜"
      投与経路: "吸入（MDI・DPI）"
      代表薬剤: "SABA（サルブタモール）、吸入ステロイド（ICS）、LAMA/LABA合剤"
      シフトの核心: "肺局所への直接デリバリー。全身曝露を最小化しつつ気道に高濃度を届ける。消化管・肝初回通過を完全バイパス"
      薬局文脈: "吸入手技の個別指導が肝。デバイス間の操作差（ハンドセット vs. カプセル）が服薬ミスの温床"

    - 時代: "2020年代〜"
      投与経路: "吸入（IoT連動スマート吸入器）"
      代表薬剤: "Propeller Health連動デバイス、ELLIPTA＋センサー、日本ではスマートデバイス治験段階"
      シフトの核心: "吸入回数・手技・時刻をセンサーが記録しBluetooth送信。服薬アドヒアランスをリアルタイム可視化。2025年末までに呼吸器デバイスの75%がスマート化予測"
      薬局文脈: "データが薬局・医師に共有されれば、RMPの動的運用に近づく。タブネオス的な「事後に気づく」構造を崩せる可能性"
      補足: "日本での保険収載・実装は現在過渡期"

  # ─────────────────────────────────────
  # 点鼻（経鼻・脳直達）
  # ─────────────────────────────────────
  点鼻_経鼻:

    - 時代: "2000年代〜（既存YAMLより）"
      投与経路: "点鼻（タンパク製剤・ペプチド）"
      代表薬剤: "デスモプレシン（ミニリンメルト）、カルシトニン点鼻"
      シフトの核心: "消化管分解・肝初回通過を回避。鼻粘膜から直接血中へ。針なし投与の実現"
      薬局文脈: "高齢者・嚥下困難患者への代替経路として説明設計が必要"

    - 時代: "2019年〜"
      投与経路: "点鼻（血液脳関門バイパス・中枢直達）"
      代表薬剤: "エスケタミン点鼻（スプラバト）：治療抵抗性うつ病"
      シフトの核心: "嗅神経・三叉神経経路を経由し血液脳関門（BBB）を迂回して脳へ直達。静脈投与の即効性を針なしで再現"
      薬局文脈: "30分の医療機関内観察義務。乱用リスク管理が必須。RMP的フォローが機能した稀な成功例"

    - 時代: "2026年〜（展望）"
      投与経路: "点鼻（CNS疾患・神経変性）"
      代表薬剤: "アルツハイマー・パーキンソン向け点鼻製剤（開発段階複数）"
      シフトの核心: "アムシェプリ（細胞移植）と並行して、非侵襲的脳直達ルートとして急拡大中。BBBバイパスは次世代CNS治療の主戦場"
      薬局文脈: "アムシェプリの「移植後1年の免疫抑制管理」と対比される非侵襲的選択肢として患者説明に活用可能"

  # ─────────────────────────────────────
  # 経皮（貼付・マイクロニードル）
  # ─────────────────────────────────────
  経皮_貼付:

    - 時代: "1980年代〜"
      投与経路: "経皮（貼付剤）"
      代表薬剤: "ニュープロパッチ（ロチゴチン：パーキンソン）、フェンタニルパッチ、ニコチンパッチ"
      シフトの核心: "皮膚を通じた定常速度放出。嚥下困難・胃腸障害患者に対応。アムシェプリ登場前のパーキンソン治療の一形態"
      薬局文脈: "貼付部位・交換間隔の指導が脱落防止の要。アムシェプリとの使い分け説明が近未来の業務"

    - 時代: "2020年代〜"
      投与経路: "経皮（マイクロニードルパッチ）"
      代表薬剤: "インフルエンザワクチン経皮製剤（開発段階）、インスリンマイクロニードル（試験段階）"
      シフトの核心: "皮膚角質層を微細針で painless に突破。生物学的製剤・ワクチンの自己投与を可能にする次世代経皮DDS"
      薬局文脈: "自己注射指導の代替として薬局の役割が拡大する可能性。まだ過渡期"

  # ─────────────────────────────────────
  # 注射（皮下・筋注・静注）
  # ─────────────────────────────────────
  注射_皮下_筋注_静注:

    - 時代: "1980年代〜"
      投与経路: "静注・皮下注（生物学的製剤）"
      代表薬剤: "インスリン、インターフェロン、TNF阻害薬（ヒュミラ等）"
      シフトの核心: "遺伝子組み換えで細胞に作らせたタンパク質を注射で投与。化学合成不可能な巨大分子の実用化"
      薬局文脈: "自己注射指導・針廃棄指導が定番業務に。バイオ後続品（BS）との切り替え説明も"

    - 時代: "2021年〜"
      投与経路: "皮下注（長期徐放・デポ注射）"
      代表薬剤: "パリペリドンパルミチン酸エステル（ゼプリオン：統合失調症）、カボテグラビル（HIV予防）"
      シフトの核心: "月1回〜3か月に1回の超長期放出。毎日の内服アドヒアランス問題を投与頻度で構造的に解決"
      薬局文脈: "次回注射日管理・医療機関との連携が薬局の新業務。RMPの動的運用モデルとして参照価値あり"

  # ─────────────────────────────────────
  # 脳内直接投与・細胞移植（次元上昇）
  # ─────────────────────────────────────
  脳内直接_細胞移植:

    - 時代: "2026年〜"
      投与経路: "脳内直接投与（iPS細胞移植）"
      代表薬剤: "アムシェプリ（ドパミン神経前駆細胞：パーキンソン病）"
      シフトの核心: "化学物質・タンパク質の投与から、生きた細胞の脳内インストールへ。機能の根本的再構築（次元上昇）"
      免疫リスク: "GVHDではなく拒絶反応（宿主が細胞を攻撃）。移植初期1年間のタクロリムス免疫抑制が必須"
      薬局文脈: |
        従来の「ドパミン補充薬（L-ドパ等）の調整」から、
        「再生医療成功のための免疫抑制プロトコル管理」への業務転換。
        1年間の服薬遵守＋感染リスク説明が命綱。
        ニュープロパッチ（経皮）との使い分け説明も近未来の現場課題。

  # ─────────────────────────────────────
  # 番外：デバイス・UIデザイン軸
  # ─────────────────────────────────────
  デバイス_UIデザイン:

    - 事例: "エピペン（アドレナリン自己注射）"
      問題: "ツインジェクト2本目は黄色キャップを外す設計→誤操作による死亡事例"
      解決: "現在は音声ガイド付きデバイスへ改良"
      教訓: "『悲劇的なデザイン』の典型例。最悪シナリオを前提にしたUI設計が命を救う"
      タブネオス接続: "RMP資材に「患者が違和感を感じた時のフロー図」がなかったことと同構造の失敗"

    - 事例: "スマート吸入器（IoT連動）"
      問題: "吸入忘れ・手技ミスが自覚されないまま病状悪化"
      解決: "センサーが吸入回数・時刻・手技を記録、医師・薬局へデータ共有"
      教訓: "動的モニタリングによるRMP機能不全の補完。タブネオスで欠けていた『即時フィードバックループ』の実装"

    - 事例: "タブネオス患者向けRMP資材"
      問題: "レッドフラッグサイン（黄疸・茶褐色尿）発現時の緊急連絡フロー図が未整備"
      解決方向: "即時行動規定表（緊急連絡先・中止判断基準・症状チェックリスト）の薬局独自整備"
      教訓: "フォローアップ体制と行動規定表を用意できるかどうかが、薬局の階層の境目"
